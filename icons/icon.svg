<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <!-- Clip to rounded square so corners are transparent -->
    <clipPath id="roundedSquare">
      <rect width="128" height="128" rx="22"/>
    </clipPath>
  </defs>

  <!-- Dark background clipped to rounded square -->
  <rect width="128" height="128" rx="22" fill="#1a1f2e" clip-path="url(#roundedSquare)"/>

  <!-- Green triangle (left) -->
  <polygon points="22,20 22,90 80,55" fill="#6fdd5a" clip-path="url(#roundedSquare)"/>

  <!-- Grey/silver triangle (right) -->
  <polygon points="52,34 52,90 102,62" fill="#8a9099" clip-path="url(#roundedSquare)"/>

  <!-- White pill badge top-right with AI — sits on top, outside clip so it overlaps the corner -->
  <rect x="76" y="6" width="46" height="22" rx="11" fill="white"/>
  <text x="99" y="21.5" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-weight="800" font-size="13" fill="#1a1f2e">AI</text>
</svg>
